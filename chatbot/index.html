<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Denis — AI Dashboard</title>
    <!-- Tailwind CSS (using CDN for simplicity) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
      }
    </style>

    <style type="text/tailwindcss">
      @theme {
        --font-sans: "Inter", sans-serif;
      }
      * {
        font-family: "Inter", sans-serif;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d4d4d8;
        border-radius: 99px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a1a1aa;
      }

      /* Auto-grow textarea */
      .auto-grow {
        resize: none;
        overflow-y: auto;
        max-height: 200px;
      }

      /* Typing dots */
      @keyframes typingBlink {
        0%,
        80%,
        100% {
          opacity: 0.25;
          transform: scale(0.75);
        }
        40% {
          opacity: 1;
          transform: scale(1);
        }
      }
      .typing-dot:nth-child(1) {
        animation: typingBlink 1.2s ease-in-out infinite 0s;
      }
      .typing-dot:nth-child(2) {
        animation: typingBlink 1.2s ease-in-out infinite 0.2s;
      }
      .typing-dot:nth-child(3) {
        animation: typingBlink 1.2s ease-in-out infinite 0.4s;
      }

      /* Message fade-in */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .msg-animate {
        animation: fadeUp 0.25s ease forwards;
      }

      /* Modal Background */
      .modal-backdrop {
        background-color: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
      }
      /* Status dot animations */
      @keyframes pulse-green {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.5);
        }
        50% {
          box-shadow: 0 0 0 5px rgba(52, 211, 153, 0);
        }
      }
      @keyframes pulse-red {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.5);
        }
        50% {
          box-shadow: 0 0 0 5px rgba(248, 113, 113, 0);
        }
      }
      .status-online {
        background: #34d399;
        animation: pulse-green 2s ease-in-out infinite;
      }
      .status-offline {
        background: #f87171;
        animation: pulse-red 2s ease-in-out infinite;
      }
    </style>
  </head>

  <body
    class="bg-[#111111] text-neutral-900 h-screen w-screen flex flex-col md:flex-row overflow-hidden p-2 md:p-3 gap-2 md:gap-3"
  >
    <!-- ── Left Sidebar (Dark) ── -->
    <div
      id="sidebar-root"
      class="h-full rounded-2xl overflow-hidden shrink-0 hidden md:block z-20"
    ></div>

    <!-- ── Main Center Area (White) ── -->
    <main
      class="flex flex-col flex-1 min-w-0 h-full bg-white rounded-2xl relative shadow-sm overflow-hidden border border-neutral-200"
    >
      <!-- Topbar actions (API keys, Clear) -->
      <!-- Desktop Sidebar Toggle (top-left) -->
      <button
        id="sidebarToggle"
        class="absolute top-3 md:top-4 left-3 md:left-4 hidden md:flex items-center justify-center w-8 h-8 rounded-lg border border-neutral-200 bg-white text-neutral-600 hover:bg-neutral-100 active:scale-95 transition z-10"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>

      <div
        class="absolute top-3 md:top-4 right-3 md:right-4 flex items-center gap-2 z-10"
      >
        <!-- Mobile Sidebar Toggle -->
        <button
          id="mobileMenuBtn"
          class="md:hidden flex items-center justify-center w-8 h-8 rounded-lg border border-neutral-200 bg-white text-neutral-600 hover:bg-neutral-100 active:scale-95 transition"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>

        <!-- Right Sidebar Toggle -->
        <button
          id="rightSidebarToggle"
          class="flex items-center justify-center w-8 h-8 rounded-lg border border-neutral-200 bg-white text-neutral-600 hover:bg-neutral-100 active:scale-95 transition"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"

            <line x1="15" y1="3" x2="15" y2="21" />

        </button>

        <!-- Server Status Indicator -->
        <div

          title="Checking server..."
          class="w-2.5 h-2.5 rounded-full bg-neutral-300 transition-all duration-500"
        ></div>
        <button

          class="flex items-center gap-1.5 text-[11px] md:text-xs font-medium text-neutral-500 hover:text-red-500 transition px-2 md:px-3 py-1.5 rounded-lg hover:bg-neutral-100 active:scale-95 border border-neutral-200 bg-white"
        >

            fill="none"
            stroke="currentColor"
            stroke-width="2"

            <path d="M10 11v6M14 11v6" />
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
          </svg>
          <span class="hidden sm:inline">Clear</span>
        </button>
      </div>

      <!-- Chat area -->
      <div
        id="chatArea"
        class="flex-1 overflow-y-auto scroll-smooth pt-16 md:pt-20"
      >
        <div class="max-w-4xl mx-auto px-4 md:px-8 pb-36 md:pb-32 space-y-2">
          <div id="emptyState-root"></div>
          <div id="messages" class="space-y-6"></div>
        </div>
      </div>

      <!-- Input area (Fixed at bottom of main area) -->
      <div
        class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white to-transparent pt-10 pb-4 md:pb-8 px-4 md:px-8"
      >
        <div class="max-w-4xl mx-auto">

            <div class="flex items-center justify-between mt-1">
              <button
                class="flex items-center gap-2 text-xs font-medium text-neutral-500 hover:bg-neutral-200 px-2 md:px-3 py-1.5 rounded-lg transition"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >

                    d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"
                  />
                </svg>
                <span class="hidden sm:inline">Attach</span>
                <span class="hidden sm:inline opacity-50 ml-1">⌘</span>
              </button>

              <button
                id="sendBtn"
                class="shrink-0 w-8 h-8 flex items-center justify-center rounded-full transition-all duration-150 active:scale-90 bg-[#111111] text-white hover:bg-black disabled:bg-neutral-200 disabled:text-neutral-400 disabled:cursor-not-allowed"
                disabled
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"

                >
                  <line x1="5" y1="12" x2="19" y2="12" />

              </button>
            </div>
          </div>

          <div
            class="hidden sm:flex justify-center gap-4 mt-4 md:mt-6 text-[10px] md:text-[11px] text-neutral-400"
          >
            <span class="hover:text-neutral-600 cursor-pointer"
              >2026 Lumina</span

            <span>·</span>
            <span class="hover:text-neutral-600 cursor-pointer"
              >Privacy Policy</span
            >
            <span>·</span>
            <span class="hover:text-neutral-600 cursor-pointer">Support</span>
          </div>
        </div>
      </div>
    </main>

    <!-- ── Right Sidebar (Widgets) ── -->

        <!-- Action Buttons (Settings & History) -->

              width="16"

    <script type="module" src="script.js"></script>

    <!-- Server health polling -->
    <script>
      const SERVER_URL = "http://localhost:3000";
      const dot = document.getElementById("serverStatusDot");
      async function checkHealth() {
        try {
          const res = await fetch(`${SERVER_URL}/api/health`, {
            cache: "no-store",
          });
          const { status } = await res.json();
          if (status === "ok") {
            dot.className =
              "w-2.5 h-2.5 rounded-full status-online transition-all duration-500";
            dot.title = "Server online";
          } else throw new Error();
        } catch {
          dot.className =
            "w-2.5 h-2.5 rounded-full status-offline transition-all duration-500";
          dot.title = "Server offline";
        }
      }
      checkHealth();
      setInterval(checkHealth, 10000);
    </script>
  </body>
</html>
